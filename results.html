<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="utf-8">  
  <title>Results | VR Embodied Learning</title>  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>  
  <style>  
    * { box-sizing: border-box; margin: 0; padding: 0; }  

    body {  
      font-family: 'Helvetica Neue', Arial, sans-serif;  
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);  
      min-height: 100vh;  
      color: #e0e0e0;  
      padding: 40px 20px;  
    }  

    .container { max-width: 860px; margin: 0 auto; }  

    h1 {  
      text-align: center;  
      font-size: 1.8rem;  
      color: #fff;  
      margin-bottom: 8px;  
    }  

    .subtitle {  
      text-align: center;  
      color: #718096;  
      font-size: 0.9rem;  
      margin-bottom: 48px;  
    }  

    .grid {  
      display: grid;  
      grid-template-columns: 1fr 1fr;  
      gap: 24px;  
      margin-bottom: 24px;  
    }  

    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }  

    .card {  
      background: rgba(255,255,255,0.05);  
      border: 1px solid rgba(255,255,255,0.08);  
      border-radius: 14px;  
      padding: 28px;  
    }  

    .card.full { grid-column: 1 / -1; }  

    .card-title {  
      font-size: 0.72rem;  
      letter-spacing: 0.12em;  
      text-transform: uppercase;  
      color: #63b3ed;  
      margin-bottom: 20px;  
    }  

    .stat-big {  
      font-size: 3rem;  
      font-weight: 700;  
      color: #fff;  
      line-height: 1;  
    }  

    .stat-label {  
      font-size: 0.82rem;  
      color: #718096;  
      margin-top: 6px;  
    }  

    .stat-row {  
      display: flex;  
      gap: 32px;  
      flex-wrap: wrap;  
      margin-top: 8px;  
    }  

    .stat-item { text-align: center; }  

    canvas { max-height: 280px; }  

    .card-list {  
      list-style: none;  
      display: flex;  
      flex-direction: column;  
      gap: 10px;  
    }  

    .card-item {  
      display: flex;  
      align-items: center;  
      gap: 12px;  
      font-size: 0.88rem;  
    }  

    .card-dot {  
      width: 12px; height: 12px;  
      border-radius: 50%;  
      flex-shrink: 0;  
    }  

    .card-name { flex: 1; color: #e2e8f0; }  

    .card-status {  
      font-size: 0.75rem;  
      padding: 3px 10px;  
      border-radius: 12px;  
      font-weight: 600;  
    }  

    .visited { background: rgba(56,161,105,0.2); color: #68d391; }  
    .not-visited { background: rgba(113,128,150,0.2); color: #718096; }  

    .score-bar-wrap {  
      margin-bottom: 14px;  
    }  

    .score-bar-label {  
      display: flex;  
      justify-content: space-between;  
      font-size: 0.82rem;  
      color: #a0aec0;  
      margin-bottom: 6px;  
    }  

    .score-bar-bg {  
      height: 8px;  
      background: #2d3748;  
      border-radius: 4px;  
      overflow: hidden;  
    }  

    .score-bar-fill {  
      height: 100%;  
      border-radius: 4px;  
      transition: width 0.8s ease;  
    }  

    .btn-reset {  
      display: block;  
      margin: 32px auto 0;  
      padding: 10px 28px;  
      background: rgba(229,62,62,0.15);  
      border: 1px solid rgba(229,62,62,0.3);  
      color: #fc8181;  
      border-radius: 8px;  
      cursor: pointer;  
      font-size: 0.85rem;  
      transition: background 0.2s;  
    }  

    .btn-reset:hover { background: rgba(229,62,62,0.25); }  

    .no-data {  
      text-align: center;  
      color: #718096;  
      padding: 48px 0;  
    }  

    .no-data a { color: #63b3ed; }  

    .nav-links {  
      text-align: center;  
      margin-top: 36px;  
    }  

    .nav-links a {  
      color: #63b3ed;  
      text-decoration: none;  
      margin: 0 16px;  
      font-size: 0.88rem;  
    }  
  </style>  
</head>  
<body>  

<div class="container">  

  <h1>Research Results</h1>  
  <p class="subtitle">Research Results · VR Embodied Learning Prototype · sara6v6</p>  

  <div id="main-content"></div>  

  <div class="nav-links">  
    <a href="index.html">← VR Scene</a>  
    <a href="survey.html">← Back to Survey</a>  
  </div>  

</div>  

<script>  
const CARDS = [  
  { id: 'card-1', name: '① Embodied Cognition', color: '#ff6b6b' },  
  { id: 'card-2', name: '② VR Presence',        color: '#4ecdc4' },  
  { id: 'card-3', name: '③ Body Ownership',      color: '#a855f7' },  
  { id: 'card-4', name: '④ Learning Engagement', color: '#f59e0b' },  
  { id: 'card-5', name: '⑤ Research Design',     color: '#10b981' },  
];  

const SURVEY_LABELS = {  
  q1: 'VR Familiarity (Pre)',  
  q2: 'Learning Motivation (Pre)',  
  q3: 'Spatial Presence',  
  q4: 'Body Ownership',  
  q5: 'Cognitive Engagement',  
  q6: 'Emotional Engagement',  
  q7: 'Embodied Interaction Understanding',  
};  

function render() {  
  const progressData = JSON.parse(localStorage.getItem('vr-learning-progress') || '{}');  
  const surveyData   = JSON.parse(localStorage.getItem('vr-survey-data') || '{}');  
  const container = document.getElementById('main-content');  

  const visitedCount = Object.keys(progressData).length;  
  const hasSurvey = Object.keys(surveyData).length > 0;  

  if (visitedCount === 0 && !hasSurvey) {  
    container.innerHTML = `  
      <div class="no-data">  
        <p style="font-size:1.1rem;color:#e2e8f0;margin-bottom:12px">No data yet</p>  
        <p>Please <a href="survey.html">complete the pre-survey</a>, then enter the VR scene and complete the post-survey</p>  
      </div>`;  
    return;  
  }  

  // 统计卡片访问  
  const visitedIds = Object.keys(progressData);  

  // 后测均值  
  const postKeys = ['q3','q4','q5','q6','q7'];  
  const postVals = postKeys.map(k => surveyData[k] || null).filter(v => v !== null);  
  const postMean = postVals.length ? (postVals.reduce((a,b)=>a+b,0)/postVals.length).toFixed(2) : 'N/A';  

  container.innerHTML = `  
    <div class="grid">  

      <!-- 统计摘要 -->  
      <div class="card">  
        <div class="card-title">Learning Progress</div>  
        <div class="stat-big">${visitedCount}<span style="font-size:1.2rem;color:#718096">/5</span></div>  
        <div class="stat-label">Knowledge cards explored</div>  
        <div style="margin-top:20px;height:6px;background:#2d3748;border-radius:3px">  
          <div style="height:100%;width:${visitedCount/5*100}%;background:linear-gradient(90deg,#38a169,#68d391);border-radius:3px;transition:width 1s"></div>  
        </div>  
      </div>  

      <!-- 问卷均值 -->  
      <div class="card">  
        <div class="card-title">Survey Score · Post-Survey Average</div>  
        <div class="stat-big">${postMean}<span style="font-size:1rem;color:#718096"> / 7</span></div>  
        <div class="stat-label">Presence + Engagement combined mean</div>  
        ${hasSurvey ? `<div style="margin-top:8px;font-size:0.8rem;color:#718096">  
          Pre-survey time: ${surveyData['pre-timestamp'] ? new Date(surveyData['pre-timestamp']).toLocaleString() : 'N/A'}<br>  
          Post-survey time: ${surveyData['post-timestamp'] ? new Date(surveyData['post-timestamp']).toLocaleString() : 'N/A'}  
        </div>` : ''}  
      </div>  

      <!-- 卡片访问状态 -->  
      <div class="card">  
        <div class="card-title">Card Exploration · Visit Status</div>  
        <ul class="card-list">  
          ${CARDS.map(c => `  
            <li class="card-item">  
              <span class="card-dot" style="background:${c.color}"></span>  
              <span class="card-name">${c.name}</span>  
              <span class="card-status ${visitedIds.includes(c.id) ? 'visited' : 'not-visited'}">  
                ${visitedIds.includes(c.id) ? '✓ Visited' : 'Not visited'}  
              </span>  
            </li>  
          `).join('')}  
        </ul>  
      </div>  

      <!-- 雷达/柱状图 -->  
      <div class="card">  
        <div class="card-title">Survey Scores · Per Dimension</div>  
        <canvas id="survey-chart"></canvas>  
      </div>  

      <!-- 前后测对比 -->  
      ${hasSurvey && surveyData.q1 ? `  
      <div class="card full">  
        <div class="card-title">Pre vs Post · Score Breakdown</div>  
        ${Object.keys(SURVEY_LABELS).map(k => {  
          const val = surveyData[k];  
          if (!val) return '';  
          const pct = (val/7)*100;  
          const colors = { q1:'#63b3ed', q2:'#63b3ed', q3:'#ff6b6b', q4:'#a855f7', q5:'#f59e0b', q6:'#10b981', q7:'#4ecdc4' };  
          return `  
            <div class="score-bar-wrap">  
              <div class="score-bar-label">  
                <span>${SURVEY_LABELS[k]}</span>  
                <span style="color:#fff;font-weight:600">${val} / 7</span>  
              </div>  
              <div class="score-bar-bg">  
                <div class="score-bar-fill" style="width:${pct}%;background:${colors[k]||'#63b3ed'}"></div>  
              </div>  
            </div>`;  
        }).join('')}  
      </div>` : ''}  

    </div>  

    <button class="btn-reset" onclick="resetData()">Reset All Data</button>  
  `;  

  // 渲染Chart.js柱状图  
  const surveyKeys = postKeys.filter(k => surveyData[k]);  
  if (surveyKeys.length > 0) {  
    const ctx = document.getElementById('survey-chart').getContext('2d');  
    new Chart(ctx, {  
      type: 'bar',  
      data: {  
        labels: surveyKeys.map(k => SURVEY_LABELS[k]),  
        datasets: [{  
          label: 'Score (max 7)',  
          data: surveyKeys.map(k => surveyData[k]),  
          backgroundColor: ['#ff6b6b88','#a855f788','#f59e0b88','#10b98188','#4ecdc488'],  
          borderColor:     ['#ff6b6b',  '#a855f7',  '#f59e0b',  '#10b981',  '#4ecdc4'],  
          borderWidth: 2,  
          borderRadius: 6,  
        }]  
      },  
      options: {  
        responsive: true,  
        scales: {  
          y: {  
            min: 0, max: 7,  
            ticks: { color: '#718096', stepSize: 1 },  
            grid: { color: 'rgba(255,255,255,0.05)' }  
          },  
          x: {  
            ticks: { color: '#a0aec0', font: { size: 10 } },  
            grid: { display: false }  
          }  
        },  
        plugins: {  
          legend: { display: false }  
        }  
      }  
    });  
  }  
}  

function resetData() {  
  if (confirm('Are you sure you want to clear all experiment data?')) {  
    localStorage.removeItem('vr-learning-progress');  
    localStorage.removeItem('vr-survey-data');  
    render();  
  }  
}  

render();  
</script>  

</body>  
</html>
