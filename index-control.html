<script>
/**
 * Control-condition scene logic.
 * Developer: Xiala Dilimulati, 2025.
 * The environment and learning topics remain credible while embodied
 * affordances are removed for an exploratory between-condition comparison.
 */
// CONTROL CONDITION DESIGN RATIONALE
// Embodied affordances such as avatar hands, gaze dwell activation,
// and teleport feedback are deliberately removed to create a comparison
// condition with the same learning content but reduced bodily agency cues.
const BehaviorLog = {
  sessionStart: Date.now(),
  events: JSON.parse(localStorage.getItem('vr-behavior-log-control') || '[]'),
  log(type, detail = {}) {
    const entry = {
      type,
      condition: 'control',
      timestamp: new Date().toISOString(),
      elapsed_time: Math.round((Date.now() - this.sessionStart) / 1000),
      user_action: type,
      ...detail
    };
    this.events.push(entry);
    localStorage.setItem('vr-behavior-log-control', JSON.stringify(this.events));
    console.log('[BehaviorLog-Control]', entry);
  }
};

// ─── Progress tracking ───────────────────────────────────────
const Progress = {
  data: JSON.parse(localStorage.getItem('vr-learning-progress-control') || '{}'),
  save() { localStorage.setItem('vr-learning-progress-control', JSON.stringify(this.data)); },
  markVisited(id) {
    this.data[id] = { visited: true, time: new Date().toISOString() };
    this.save();
  },
  getCount() { return Object.keys(this.data).length; }
};

// ─── Click-to-open component (no gaze, no teleport) ─────────
AFRAME.registerComponent('click-trigger', {
  schema: { targetId: { default: '' } },
  init() {
    this.el.addEventListener('click', () => {
      Progress.markVisited(this.data.targetId);
      BehaviorLog.log('card_open', { card_id: this.data.targetId, user_action: 'object_click' });
      VRSceneUI.openCard(this.data.targetId);
      updateHUD();
    });
  }
});

function updateHUD() {
  VRSceneUI.updateProgress(Progress.getCount());
}

window.addEventListener('load', () => {
  ResearchStorage.setSelectedCondition('control');
  VRSceneUI.initialize();
  BehaviorLog.log('session_start');
  updateHUD();
});

window.onKnowledgeCardClose = (cardId) => BehaviorLog.log('card_close', { card_id: cardId, user_action: 'panel_close' });

window.addEventListener('beforeunload', () => {
  BehaviorLog.log('session_end', {
    cards_visited: Progress.getCount(),
    session_duration: Math.round((Date.now() - BehaviorLog.sessionStart) / 1000)
  });
});
</script>
