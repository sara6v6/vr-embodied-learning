<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Embodied Learning — Control Condition</title>
  <meta name="description" content="Control condition: text-based learning without embodied interaction">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<body>

<script>
// ─── Behavior logging (control group) ───────────────────────
const BehaviorLog = {
  sessionStart: Date.now(),
  events: JSON.parse(localStorage.getItem('vr-behavior-log-control') || '[]'),
  log(type, detail = {}) {
    const entry = {
      type,
      timestamp: new Date().toISOString(),
      elapsed: Math.round((Date.now() - this.sessionStart) / 1000),
      ...detail
    };
    this.events.push(entry);
    localStorage.setItem('vr-behavior-log-control', JSON.stringify(this.events));
    console.log('[BehaviorLog-Control]', entry);
  }
};

// ─── Progress tracking ───────────────────────────────────────
const Progress = {
  data: JSON.parse(localStorage.getItem('vr-learning-progress-control') || '{}'),
  save() { localStorage.setItem('vr-learning-progress-control', JSON.stringify(this.data)); },
  markVisited(id) {
    this.data[id] = { visited: true, time: new Date().toISOString() };
    this.save();
  },
  getCount() { return Object.keys(this.data).length; }
};

// ─── Click-to-open component (no gaze, no teleport) ─────────
AFRAME.registerComponent('click-trigger', {
  schema: { targetId: { default: '' } },
  init() {
    this.el.addEventListener('click', () => {
      const target = document.getElementById(this.data.targetId);
      if (target) {
        const visible = target.getAttribute('visible');
        target.setAttribute('visible', !visible);
        if (!visible) {
          Progress.markVisited(this.data.targetId);
          BehaviorLog.log('card_open', { cardId: this.data.targetId, condition: 'control' });
          updateHUD();
        } else {
          BehaviorLog.log('card_close', { cardId: this.data.targetId, condition: 'control' });
        }
      }
    });
  }
});

function updateHUD() {
  const hud = document.getElementById('hud-text');
  if (hud) {
    hud.setAttribute('value', `Progress: ${Progress.getCount()}/5 cards read`);
  }
}

window.addEventListener('load', () => {
  BehaviorLog.log('session_start', { condition: 'control' });
  updateHUD();
});

window.addEventListener('beforeunload', () => {
  BehaviorLog.log('session_end', {
    condition: 'control',
    cardsVisited: Progress.getCount()
  });
});
</script>
