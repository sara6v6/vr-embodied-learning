<script>
/**
 * Embodied VR condition scene logic.
 * Developer: Xiala Dilimulati, 2025.
 * Gaze-based interaction approximates attention direction without requiring
 * a hand controller; avatar hands provide a minimal body-ownership cue.
 */
// EMBODIED CONDITION DESIGN RATIONALE
// Avatar hands are attached to the first-person camera to support
// a minimal body ownership cue in the embodied VR condition.
// Three affordances distinguish this condition from control:
// 1. Persistent hand visibility for first-person bodily self-location.
// 2. Gaze-triggered reach feedback for agency over card activation.
// 3. Teleport hand response for body-action causality.
// These embodied affordances are deliberately absent from the control condition
// to support a clean between-condition comparison.
const Progress = {
  data: JSON.parse(localStorage.getItem('vr-learning-progress') || '{}'),
  save() { localStorage.setItem('vr-learning-progress', JSON.stringify(this.data)); },
  markVisited(id) {
    this.data[id] = { visited: true, time: new Date().toISOString() };
    this.save();
    console.log('[Progress] visited:', id, '| total:', Object.keys(this.data).length);
  },
  getCount() { return Object.keys(this.data).length; }
};

// ─── 行为追踪（时间戳 + 探索序列）────────────────────────────
const BehaviorLog = {
  sessionStart: Date.now(),
  events: JSON.parse(localStorage.getItem('vr-behavior-log') || '[]'),

  log(type, cardId, extra) {
    const entry = {
      type,
      condition: 'embodied',
      card_id: cardId || null,
      timestamp: new Date().toISOString(),
      elapsed_time: Math.round((Date.now() - this.sessionStart) / 1000),
      user_action: type,
      ...extra
    };
    this.events.push(entry);
    localStorage.setItem('vr-behavior-log', JSON.stringify(this.events));
    console.log('[BehaviorLog]', entry);
  },

  startSession() {
    this.log('session_start');
  },

  logCardOpen(cardId) {
    this.log('card_open', cardId);
  },

  logCardClose(cardId) {
    this.log('card_close', cardId);
  },

  logTeleport(x, z) {
    this.log('teleport', null, { position: { x: Math.round(x * 10) / 10, z: Math.round(z * 10) / 10 }, user_action: 'floor_click' });
  },

  getTotalDuration() {
    return Math.round((Date.now() - this.sessionStart) / 1000);
  }
};

// ─── 凝视交互组件（无需手柄，注视2秒触发）───────────────────
AFRAME.registerComponent('gaze-trigger', {
  schema: { duration: { default: 2000 }, targetId: { default: '' } },
  init() {
    this.gazeStart = null;
    this.gazing = false;
    this.ring = null;
    this.el.addEventListener('mouseenter', () => {
      this.gazeStart = Date.now();
      this.gazing = true;
      if (this.ring) this.ring.setAttribute('visible', true);
      setHandsPose('reach');
    });
    this.el.addEventListener('mouseleave', () => {
      this.gazing = false;
      this.gazeStart = null;
      if (this.ring) this.ring.setAttribute('visible', false);
      if (this.ring) this.ring.setAttribute('scale', '1 1 1');
      setHandsPose('neutral');
    });
  },
  tick() {
    if (!this.gazing || !this.gazeStart) return;
    const elapsed = Date.now() - this.gazeStart;
    const progress = Math.min(elapsed / this.data.duration, 1);
    if (this.ring) {
      const s = 1 + progress * 0.5;
      this.ring.setAttribute('scale', `${s} ${s} ${s}`);
    }
    if (progress >= 1) {
      this.gazing = false;
      this.gazeStart = null;
      if (this.ring) this.ring.setAttribute('visible', false);
      Progress.markVisited(this.data.targetId);
      BehaviorLog.logCardOpen(this.data.targetId);
      VRSceneUI.openCard(this.data.targetId);
      pulseHands();
      updateHUD();
    }
  }
});

// ─── 传送移动组件 ─────────────────────────────────────────────
AFRAME.registerComponent('teleport-on-click', {
  init() {
    this.el.addEventListener('click', (e) => {
      const intersection = e.detail.intersection;
      if (!intersection) return;
      const pos = intersection.point;
      const rig = document.getElementById('player-rig');
      rig.setAttribute('position', `${pos.x} 0 ${pos.z}`);
      BehaviorLog.logTeleport(pos.x, pos.z);
      teleportHandFeedback();
    });
  }
});

// ─── HUD进度更新 ─────────────────────────────────────────────
function updateHUD() {
  VRSceneUI.updateProgress(Progress.getCount());
}

function animateHand(id, property, to, duration = 220) {
  const hand = document.getElementById(id);
  if (hand) hand.setAttribute('animation__feedback', `property: ${property}; to: ${to}; dur: ${duration}; easing: easeOutQuad`);
}

function setHandsPose(pose) {
  const reach = pose === 'reach';
  animateHand('left-hand', 'position', reach ? '-0.29 -0.42 -0.68' : '-0.29 -0.42 -0.75');
  animateHand('right-hand', 'position', reach ? '0.29 -0.42 -0.68' : '0.29 -0.42 -0.75');
}

function pulseHands() {
  ['left-hand', 'right-hand'].forEach((id) => {
    const hand = document.getElementById(id);
    if (!hand) return;
    hand.setAttribute('animation__pulse', 'property: scale; from: 0.55 0.55 0.55; to: 0.58 0.58 0.58; dir: alternate; dur: 140; loop: 2; easing: easeInOutQuad');
  });
  setTimeout(() => setHandsPose('neutral'), 360);
}

function teleportHandFeedback() {
  animateHand('right-hand', 'position', '0.29 -0.48 -0.68', 150);
  setTimeout(() => animateHand('right-hand', 'position', '0.29 -0.42 -0.75', 230), 180);
}

window.addEventListener('load', () => {
  ResearchStorage.setSelectedCondition('embodied');
  VRSceneUI.initialize();
  BehaviorLog.startSession();
  updateHUD();
});

window.onKnowledgeCardClose = (cardId) => BehaviorLog.logCardClose(cardId);

// ─── 页面离开时记录总时长 ─────────────────────────────────────
window.addEventListener('beforeunload', () => {
  BehaviorLog.log('session_end', null, { session_duration: BehaviorLog.getTotalDuration() });
});
</script>
