<script>  
// ─── 学习进度记录（localStorage）───────────────────────────────  
const Progress = {  
  data: JSON.parse(localStorage.getItem('vr-learning-progress') || '{}'),  
  save() { localStorage.setItem('vr-learning-progress', JSON.stringify(this.data)); },  
  markVisited(id) {  
    this.data[id] = { visited: true, time: new Date().toISOString() };  
    this.save();  
    console.log('[Progress] visited:', id, '| total:', Object.keys(this.data).length);  
  },  
  getCount() { return Object.keys(this.data).length; }  
};  

// ─── 凝视交互组件（无需手柄，注视3秒触发）───────────────────  
AFRAME.registerComponent('gaze-trigger', {  
  schema: { duration: { default: 2000 }, targetId: { default: '' } },  
  init() {  
    this.gazeStart = null;  
    this.gazing = false;  
    this.ring = null;  
    this.el.addEventListener('mouseenter', () => {  
      this.gazeStart = Date.now();  
      this.gazing = true;  
      if (this.ring) this.ring.setAttribute('visible', true);  
    });  
    this.el.addEventListener('mouseleave', () => {  
      this.gazing = false;  
      this.gazeStart = null;  
      if (this.ring) this.ring.setAttribute('visible', false);  
      if (this.ring) this.ring.setAttribute('scale', '1 1 1');  
    });  
  },  
  tick() {  
    if (!this.gazing || !this.gazeStart) return;  
    const elapsed = Date.now() - this.gazeStart;  
    const progress = Math.min(elapsed / this.data.duration, 1);  
    if (this.ring) {  
      const s = 1 + progress * 0.5;  
      this.ring.setAttribute('scale', `${s} ${s} ${s}`);  
    }  
    if (progress >= 1) {  
      this.gazing = false;  
      this.gazeStart = null;  
      if (this.ring) this.ring.setAttribute('visible', false);  
      // 触发显示卡片  
      const target = document.getElementById(this.data.targetId);  
      if (target) {  
        const visible = target.getAttribute('visible');  
        target.setAttribute('visible', !visible);  
        Progress.markVisited(this.data.targetId);  
        updateHUD();  
      }  
    }  
  }  
});  

// ─── 传送移动组件 ─────────────────────────────────────────────  
AFRAME.registerComponent('teleport-on-click', {  
  init() {  
    this.el.addEventListener('click', (e) => {  
      const intersection = e.detail.intersection;  
      if (!intersection) return;  
      const pos = intersection.point;  
      const camera = document.getElementById('rig');  
      camera.setAttribute('position', `${pos.x} 0 ${pos.z}`);  
    });  
  }  
});  

// ─── HUD进度更新 ─────────────────────────────────────────────  
function updateHUD() {  
  const hud = document.getElementById('hud-text');  
  if (hud) {  
    const count = Progress.getCount();  
    hud.setAttribute('value', `Learning Progress: ${count}/5 Cards`);  
  }  
}  

window.addEventListener('load', () => { updateHUD(); });  
</script>

  <a-camera id="camera" position="0 1.6 4" wasd-controls-enabled="true">  
    <a-cursor  
      color="#ffffff"  
      animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"  
      raycaster="objects: .interactive, .floor">  
    </a-cursor>  
    <!-- HUD进度条（固定在视野内）-->  
    <a-entity position="0 0.35 -1">  
      <a-box width="1.2" height="0.12" depth="0.01" color="#000000" opacity="0.5"></a-box>  
      <a-text  
        id="hud-text"  
        value="Learning Progress: 0/5 Cards"  
        position="0 0 0.01"  
        align="center"  
        color="#ffffff"  
        width="2.5">  
      </a-text>  
    </a-entity>  
    <!-- 操作提示 -->  
    <a-entity position="0 -0.38 -1">  
      <a-box width="1.8" height="0.08" depth="0.01" color="#000000" opacity="0.4"></a-box>  
      <a-text  
        value="Gaze at spheres 2s to open cards | WASD to move | Click floor to teleport"  
        position="0 0 0.01"  
        align="center"  
        color="#ffff99"  
        width="3">  
      </a-text>  
    </a-entity>  
  </a-camera>  

  <!-- 相机绑定到Rig（传送用）-->  
  <a-entity id="rig" position="0 0 4">  
  </a-entity>  

</a-scene>  

<script>  
// 把camera绑定进rig  
window.addEventListener('load', () => {  
  const rig = document.getElementById('rig');  
  const cam = document.getElementById('camera');  
  // 手动将凝视环关联  
  document.querySelectorAll('[gaze-trigger]').forEach((el, i) => {  
    const ring = el.parentElement.querySelector('a-torus');  
    if (ring) {  
      el.components['gaze-trigger'].ring = ring;  
    }  
  });  
  updateHUD();  
});  
</script>  

</body>  
</html>
