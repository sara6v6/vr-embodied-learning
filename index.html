<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VR Embodied Learning Scene</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #1a1a2e">

      <!-- 地板 -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="20" height="20"
        color="#2d2d44"
        roughness="0.8">
      </a-plane>

      <!-- 教室前墙（展示板） -->
      <a-plane
        position="0 2 -5"
        width="8" height="4"
        color="#16213e">
      </a-plane>

      <a-text
        value="VR Embodied Learning Environment"
        position="0 3 -4.9"
        align="center"
        color="#e0e0ff"
        width="7">
      </a-text>

      <a-text
        value="Exploring how presence and body ownership\ninfluence learning engagement in VR"
        position="0 2 -4.9"
        align="center"
        color="#a0a0cc"
        width="6">
      </a-text>

      <!-- 三个可交互学习对象（点击变色代表"激活/注意力投入"） -->
      <a-box
        id="obj1"
        position="-3 0.5 -3"
        color="#4CC3D9"
        depth="1" height="1" width="1"
        animation__click="property: color; to: #FF6B6B; dur: 300; startEvents: click"
        cursor-listener>
      </a-box>
      <a-text value="Memory" position="-3 1.3 -3" align="center" color="white" width="3"></a-text>

      <a-sphere
        id="obj2"
        position="0 0.7 -3"
        radius="0.6"
        color="#7BC8A4"
        animation__click="property: color; to: #FFD93D; dur: 300; startEvents: click"
        cursor-listener>
      </a-sphere>
      <a-text value="Attention" position="0 1.5 -3" align="center" color="white" width="3"></a-text>

      <a-cylinder
        id="obj3"
        position="3 0.5 -3"
        radius="0.5" height="1"
        color="#EF5FA7"
        animation__click="property: color; to: #A8FF78; dur: 300; startEvents: click"
        cursor-listener>
      </a-cylinder>
      <a-text value="Embodiment" position="3 1.3 -3" align="center" color="white" width="3"></a-text>

      <!-- 操作提示 -->
      <a-text
        value="Click objects to interact | Use mouse to look around"
        position="0 0.1 -2"
        align="center"
        color="#666699"
        width="6"
        rotation="-90 0 0">
      </a-text>

      <!-- 光源 -->
      <a-light type="ambient" color="#404066" intensity="1"></a-light>
      <a-light type="point" position="0 4 -2" color="#8080ff" intensity="0.8"></a-light>

      <!-- 摄像机+鼠标交互 -->
      <a-entity position="0 1.6 2">
        <a-camera>
          <a-cursor color="#ffffff"
            fuse="false"
            raycaster="objects: [cursor-listener]">
          </a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>

    <script>
      // 注册点击交互组件
      AFRAME.registerComponent('cursor-listener', {
        init: function () {
          this.el.addEventListener('click', function (evt) {
            console.log('Object clicked:', evt.target.id);
          });
        }
      });
    </script>
  </body>
</html>
